databases:
  - name: ew-pricing-db
    databaseName: ew_pricing
    user: ew_user
    plan: free

services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: ew-pricing-api
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ew-pricing-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: CORS_ORIGIN
        value: https://ew-pricing-frontend.onrender.com   # update after frontend deploys

  # ── Frontend (Static Site) ─────────────────────────────────────────────────
  - type: web
    name: ew-pricing-frontend
    env: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://ew-pricing-api.onrender.com   # update to your actual API URL
